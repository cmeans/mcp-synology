name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `uvx mcp-synology --version` or commit hash
      placeholder: "0.4.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Desktop
        - Claude Code
        - Claude.ai (web/mobile)
        - Cursor
        - ChatGPT
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: dsm_version
    attributes:
      label: DSM version
      placeholder: "e.g., DSM 7.2.2-72806"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure mcp-synology with ...
        2. Ask Claude to "list files in /share"
        3. See error ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Run with SYNOLOGY_LOG_LEVEL=debug and paste any error messages or server logs.
      render: shell
    validations:
      required: false
