# Dependabot version-update configuration for mcp-synology.
#
# Two ecosystems are tracked:
#   - pip:            runtime + dev dependencies declared in
#                     pyproject.toml (also picks up uv.lock so bumps
#                     stay reproducible)
#   - github-actions: workflow files under .github/workflows/
#                     (CI matrix, vdsm, publish, label automation)
#
# Schedule is weekly (Monday 06:00 America/Chicago) so PRs don't pile
# up faster than they can be reviewed solo. Each ecosystem groups its
# updates into a single PR per week to reduce notification noise.
#
# Labels named here are applied only if they already exist on the
# repo; Dependabot does not auto-create labels. The label-automation
# workflows handle the QA-flow labels separately.
#
# Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python deps: pyproject.toml + uv.lock at the repo root.
  # Covers runtime (mcp, httpx, keyring, pydantic, PyYAML, click) and
  # dev extras (pytest, pytest-cov, pytest-asyncio, respx, ruff,
  # mypy, types-PyYAML).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions used by .github/workflows/*.yml (ci, vdsm, publish,
  # test-publish, qa-gate, pr-labels, pr-labels-ci) and any
  # composite/local actions under .github/actions/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
