name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          uv sync --extra dev
          uv run pytest

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  validate-server-json:
    # Closes #44. Gate PyPI publish on registry-schema validation so a
    # malformed server.json can't half-publish: PyPI accepts everything,
    # but the registry rejects schema drift (new required fields, type
    # changes) — without this gate, PyPI ships and the registry leg fails,
    # leaving a discoverable PyPI release that isn't in the MCP registry.
    # Re-running the failed job can't fix PyPI, so the cleanup is manual
    # (yank, fix, re-tag). Validating up-front with the SAME pinned
    # mcp-publisher version that actually publishes (`./.github/actions/
    # install-mcp-publisher`) means schema drift surfaces before any
    # external side-effect lands. ci.yml runs the same check on every PR;
    # this job is the release-time backstop in case the registry schema
    # or publisher version changes between merge and tag-push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/install-mcp-publisher
      - name: Validate server.json against registry schema
        run: ./mcp-publisher validate server.json

  publish-pypi:
    needs: [build, validate-server-json]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-registry:
    # Publish (or update) the server entry in the official MCP registry.
    # Runs after publish-pypi because the registry validates that the
    # referenced PyPI package+version exists before accepting the entry.
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/install-mcp-publisher

      - name: Authenticate to MCP registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to MCP registry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Idempotent: the registry rejects re-publishing an existing
          # version (see docs/modelcontextprotocol-io/versioning.mdx:
          # "The version string MUST be unique for each publication").
          # The match string is anchored to the upstream error constant
          # `ErrInvalidVersion` in internal/database/database.go:
          #   "invalid version: cannot publish duplicate version"
          # (verified upstream against the currently-pinned mcp-publisher
          # tag in .github/actions/install-mcp-publisher/action.yml). The
          # publisher surfaces this as part of the 400 response body from
          # POST /v0/publish. If the upstream error text changes, this
          # step will fall through to `exit $status` and fail loudly —
          # preferable to silently swallowing a real publish error.
          set +e
          output=$(./mcp-publisher publish 2>&1)
          status=$?
          echo "$output"
          if [ $status -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -qF 'cannot publish duplicate version'; then
            echo "::warning::Version $TAG already exists in MCP registry — treating as no-op"
            exit 0
          fi
          exit $status

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # CHANGELOG.md is the authoritative release narrative. Extract the
          # section for the current tag and use it as the Release body so we
          # don't duplicate content or rely on low-quality auto-generated
          # commit lists. Falls back to --generate-notes if the CHANGELOG
          # has no matching entry (e.g. an emergency tag without doc prep).
          VERSION="${TAG#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## "version"( |\\()" {flag=1; next}
            flag && /^## / {exit}
            flag
          ' CHANGELOG.md > release_notes.md

          # Strip leading blank lines so the body does not start with an
          # empty paragraph.
          sed -i '/./,$!d' release_notes.md

          if [ -s release_notes.md ]; then
            echo "Found CHANGELOG entry for $VERSION ($(wc -l < release_notes.md) lines)"
            echo "use_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No CHANGELOG entry for $VERSION — falling back to auto-generated notes"
            echo "use_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          USE_CHANGELOG: ${{ steps.notes.outputs.use_changelog }}
        run: |
          # Idempotent: if a release for the tag already exists (e.g. it was
          # hand-crafted before the publish workflow ran), update its notes
          # in place with `gh release edit` rather than failing with a 422.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes in place"
            if [ "$USE_CHANGELOG" = "true" ]; then
              gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md
            else
              # Cannot regenerate auto notes on edit — leave existing body.
              gh release edit "$TAG" --title "$TAG"
            fi
          else
            echo "Creating new release $TAG"
            if [ "$USE_CHANGELOG" = "true" ]; then
              gh release create "$TAG" --title "$TAG" --notes-file release_notes.md
            else
              gh release create "$TAG" --title "$TAG" --generate-notes
            fi
          fi
